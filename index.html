<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/output.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nosso Livro 💖</title>

    <style>
      body {
        overflow-x: hidden;
      }

      .perspective {
        perspective: 1500px;
      }

      .book {
        position: relative;
        width: 320px;
        height: 220px;
      }

      .page {
        position: absolute;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        transform-origin: left;
        transition: transform 0.8s ease;
        cursor: pointer;
      }

      .page div {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 15px;
        font-weight: bold;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      }

      .front {
        background: #ec4899;
        color: white;
      }

      .back {
        background: #f43f5e;
        color: #be185d;
        transform: rotateY(180deg);
      }

      .page.flipped {
        transform: rotateY(-180deg);
      }
    </style>
  </head>

  <body class="bg-gradient-to-r from-pink-600 to-pink-700">
    <section>
      <h1 class="text-3xl font-serif text-white text-center mt-6">
        seja bem-vinda meu amor 💖
      </h1>

      <div class="text-center mt-4 space-x-4">
        <a href="frase.html" class="text-white hover:text-pink-300">Frases</a>
        <a href="carta.html" class="text-white hover:text-pink-300">Carta</a>
      </div>
    </section>

    <section class="flex flex-col items-center mt-10">
      <h2 class="text-white mb-6">vire as páginas do nosso amor ❤️</h2>

      <!-- LIVRO -->
      <div class="book perspective">
        <!-- Página 1 -->
        <div class="page">
          <div class="front">💌 Começo</div>
          <div class="back"></div>
        </div>

        <!-- Página 2 -->
        <div class="page">
          <div class="front">Cada momento com você é especial ✨</div>
          <div class="back">Eu amo te ter na minha vida 💖</div>
        </div>

        <!-- Página 3 -->
        <div class="page">
          <div class="front">Você é minha princesa 👑</div>
          <div class="back">Meu bem mais precioso 💎</div>
        </div>

        <!-- Página 4 -->
        <div class="page">
          <div class="front">Eu te amo mais que tudo 💖</div>
          <div class="back">Meus dias são melhores com você 🌹</div>
        </div>
      </div>

      <!-- BOTÕES -->
      <div class="mt-6 space-x-4">
        <button id="prevPage" class="bg-pink-500 px-4 py-2 text-white rounded">
          ← Voltar
        </button>

        <button id="nextPage" class="bg-pink-500 px-4 py-2 text-white rounded">
          Próxima →
        </button>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
